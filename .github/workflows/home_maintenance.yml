name: Home Maintenance Check

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install resend

      - name: Run maintenance check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL:   ${{ secrets.EMAIL_TO }}
          FROM_EMAIL:     ${{ secrets.EMAIL_FROM }}
          GITHUB_OWNER:   ${{ github.repository_owner }}
          GITHUB_REPO:    ${{ github.event.repository.name }}
          PAGES_URL:      ${{ secrets.MAINTENANCE_PAGES_URL }}
        run: |
          python home_maintenance/check.py
